<!DOCTYPE html>
<html>
<head>
  <title>Royal Spice - Indian Restaurant</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#111;
      color:white;
      margin:0;
    }
    header{
      background:#d35400;
      padding:20px;
      text-align:center;
      font-size:28px;
      font-weight:bold;
    }
    .container{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap:20px;
      padding:30px;
    }
    .card{
      background:#222;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 0 10px rgba(0,0,0,0.5);
      transition:0.3s;
    }
    .card:hover{
      transform:scale(1.05);
    }
    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
    }
    .card-content{
      padding:15px;
    }
    .price{
      color:#f39c12;
      font-weight:bold;
    }
    .stock{
      margin-top:10px;
      padding:5px 10px;
      border-radius:20px;
      font-size:14px;
      display:inline-block;
    }
    .in-stock{
      background:green;
    }
    .out-stock{
      background:red;
    }
  </style>
</head>
<body>

<header>Royal Spice - Indian Menu</header>

<div class="container">

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?biryani" alt="Biryani">
    <div class="card-content">
      <h3>Hyderabadi Chicken Biryani</h3>
      <p class="price">৳320</p>
      <span class="stock in-stock">In Stock</span>
    </div>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?butter-chicken" alt="Butter Chicken">
    <div class="card-content">
      <h3>Butter Chicken</h3>
      <p class="price">৳360</p>
      <span class="stock in-stock">In Stock</span>
    </div>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?naan" alt="Naan">
    <div class="card-content">
      <h3>Garlic Naan</h3>
      <p class="price">৳80</p>
      <span class="stock out-stock">Out of Stock</span>
    </div>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?paneer" alt="Paneer">
    <div class="card-content">
      <h3>Paneer Butter Masala</h3>
      <p class="price">৳280</p>
      <span class="stock in-stock">In Stock</span>
    </div>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?gulab-jamun" alt="Dessert">
    <div class="card-content">
      <h3>Gulab Jamun</h3>
      <p class="price">৳90</p>
      <span class="stock out-stock">Out of Stock</span>
    </div>
  </div>

</div>

</body>
</html>
